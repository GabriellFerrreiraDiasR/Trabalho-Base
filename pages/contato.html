<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <title>Cadastro</title>
    <link rel="stylesheet" href="../css/style.css" />
  </head>

  <body>
    <header>Cadastro de Estudante</header>

    <nav class="menu">
      <ul>
        <li><a href="../index.html">Início</a></li>

        <li><a href="sobre.html">Sobre</a></li>

        <li class="dropdown">
          <a href="#">Conteúdos ▾</a>

          <ul class="submenu">
            <li><a href="servicos.html#html">HTML</a></li>
            <li><a href="servicos.html#css">CSS</a></li>
            <li><a href="servicos.html#js">JavaScript</a></li>
          </ul>
        </li>

        <li><a href="contato.html">Cadastro</a></li>
      </ul>
    </nav>

    <main>
      <section>
        <article>
          <h2>Formulário</h2>

          <form>
            <label>Nome</label>
            <input type="text" id="nome" />

            <label>Email</label>
            <input type="email" id="email" />

            <label>Idade</label>
            <input type="number" id="idade" />

            <label>Data de nascimento</label>
            <input type="date" id="nascimento" />

            <label>Gênero</label>

            <select id="genero">
              <option value="">Selecione</option>
              <option>Masculino</option>
              <option>Feminino</option>
              <option>Outro</option>
            </select>

            <button type="button" onclick="mostrarDados()">Enviar</button>

            <button type="button" onclick="limparDados()">Limpar</button>
          </form>

          <h3>Dados informados:</h3>

          <p id="saida">Os dados aparecerão aqui.</p>
        </article>
      </section>
    </main>

    <aside>
      <h3>Dica</h3>

      <p>Treine todos os dias.</p>
    </aside>

    <footer>
      <p>Desenvolvido por Você - 2026</p>
    </footer>

    <script src="../js/script.js"></script>
  </body>
</html>
