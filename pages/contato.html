<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Cadastro</title>
  <link rel="stylesheet" href="../css/style.css">
</head>

<body>

<header>Cadastro de Estudante</header>

<nav class="menu">
  <ul>
    <li><a href="../index.html">Início</a></li>
    <li><a href="contato.html">Cadastro</a></li>
  </ul>
</nav>

<main>

<section>
  <article>

    <h2>Formulário</h2>

    <form>

      <p><label>Nome</label>
      <input type="text" id="nome" required placeholder="Digite seu nome"></p>

      <p><label>Email</label>
      <input type="email" id="email" required placeholder="exemplo@dominio.com"></p>

      <p><label>Idade</label>
      <input type="number" id="idade" required placeholder="0"></p>

      <p><label>Data de nascimento</label>
      <input type="date" id="nascimento" required placeholder="dd/mm/yyyy"></p>

      <p><label>Gênero</label>
      <select id="genero">
        <option>Masculino</option>
        <option>Feminino</option>
      </select></p>

      <button type="button" onclick="mostrarDados()">Enviar</button>
      <button type="button" onclick="limparDados()">Limpar</button>

    </form>

    <h3>Dados informados:</h3>
    <p id="saida"></p>

  </article>
</section>

</main>

<script src="../js/script.js"></script>

</body>
</html>
